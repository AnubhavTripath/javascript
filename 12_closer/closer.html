    <script>
        // mannual way to do 

        // document.getElementById("orange").onclick = function(){
        //     document.body.style.backgroundColor = `orange`
        // }
        // document.getElementById("green").onclick = function(){
        //     document.body.style.backgroundColor = `green`
        // }

        // with the below function if we use it to change the color then it will be executed immediately without clicking on the btn
        // function clickHandler(color){
        //     // document.body.style.backgroundColor = `${color}`
        // }
        


        // to solve that issue we return a function inside the function in this way it will not execute directly , it will return the function when we click on the color button
        // this is the example of "closure" that it was sharing the memory of complete lexical scope (block scope) due that reason it knows the color
        function clickHandler(color){

            return function(){
                document.body.style.backgroundColor = `${color}`
            }
        }

        document.getElementById('orange').onclick = clickHandler("orange")
        document.getElementById('green').onclick = clickHandler("green")

    </script>
